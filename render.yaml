# Render Blueprint for the Slack Access Review app — multi-workspace (public
# distribution) mode: one Node web service + one Postgres database.
# Postgres holds per-workspace OAuth tokens (encrypted), campaigns/decisions,
# and the tamper-evident audit chain. No Redis needed (OAuth state is a
# signed, self-contained value).
#
# To use: commit this file to your repo, then in Render click
#   New +  →  Blueprint  →  pick this repo.
# You'll be prompted for the values marked `sync: false`
# (Slack client id/secret + signing secret — from api.slack.com/apps).
#
# After deploy, your public install link is:
#   https://<service>.onrender.com/slack/install

databases:
  - name: slack-access-review-db
    plan: basic-256mb        # smallest paid Postgres; upgrade as installs grow
    region: oregon           # keep in the same region as the web service

services:
  - type: web
    name: slack-access-review
    runtime: node
    plan: starter            # always-on. Use "free" only for testing (it sleeps after 15 min idle).
    region: oregon           # pick the region closest to you
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true         # redeploy automatically on every git push

    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: slack-access-review-db
          property: connectionString
      - key: AUDIT_HMAC_SECRET
        generateValue: true              # Render generates a strong random secret for you
      - key: TOKEN_ENCRYPTION_KEY
        generateValue: true              # encrypts workspace bot tokens at rest (AES-256-GCM)
      - key: SLACK_CLIENT_ID
        sync: false                      # api.slack.com/apps → Basic Information → App Credentials
      - key: SLACK_CLIENT_SECRET
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      # Public base URL used to build the OAuth redirect URI. Set this to your
      # Render URL (or custom domain) — must match the Redirect URL configured
      # in Slack under OAuth & Permissions.
      - key: PUBLIC_BASE_URL
        sync: false                      # e.g. https://slack-access-review.onrender.com
      # ---- optional / legacy ----
      # Single-workspace fallback token (not needed once OAuth is enabled):
      # - key: SLACK_BOT_TOKEN
      #   sync: false
      # - key: INTERNAL_EMAIL_DOMAINS
      #   value: yourcompany.com
      # - key: AUDIT_WEBHOOK_URL
      #   sync: false
